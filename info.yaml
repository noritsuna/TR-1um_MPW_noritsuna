# OpenSUSI TR-1um MPW project information
#
project:
  title:        "noritsuna_inverter"      # Project title
  author:       "Noritsuna"      # Your name
  discord:      "noritsuna"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Inverter for OpenSUSI-TR10"      # One line description of what your project does

# Your top module name must start with "tr_1um_". Make it unique by including your github username:
# GDSII filename must be top_cell + "." + extension and placed in src/ directory.
gds:
  top_cell:     "tr_1um_noritsuna"
  extension:    "gds"
#
# LVS compare filename must be top_cell + "." + extension and placed in src/ directory.
# LVS comparison is optional, you can switch off it by put netlist_only: "true".
lvs:
  extension:    "cir"
  netlist_only: "true"
#
# Your MDP file start with "IP62_". Make it unique by including your github username:
mdp:
  file:         "IP62_noritsuna.gds"
#
# Donot modify below this line unless you know what you are doing
# TR-1um PDK repository information
pdk:
  repo:   "https://github.com/OpenSUSI/TR-1um.git"
  ref:    "main"           # Branch or tag name
  dir:    "libs.tech"
#
yaml_version: 6
